<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlightView</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: monospace; background:#0a0e14; color:#c8d8e8; height:100vh; display:flex; flex-direction:column; }
header { display:flex; align-items:center; gap:12px; padding:10px 16px; background:#111820; border-bottom:1px solid #1e2a38; flex-shrink:0; }
h1 { font-size:1rem; font-weight:bold; color:#fff; letter-spacing:0.1em; }
h1 span { color:#00d4ff; }
.controls { display:flex; gap:8px; margin-left:auto; flex-wrap:wrap; align-items:center; }
.btn { background:#0a0e14; border:1px solid #1e2a38; color:#c8d8e8; font-family:monospace; font-size:0.75rem; padding:6px 14px; border-radius:3px; cursor:pointer; white-space:nowrap; }
.btn:hover { border-color:#00d4ff; color:#00d4ff; }
.btn.ok { border-color:#ff6b35; color:#ff6b35; }
#map { flex:1; width:100%; }
#info { position:fixed; bottom:30px; left:16px; z-index:1000; background:rgba(10,14,20,0.92); border:1px solid #1e2a38; padding:12px 16px; font-size:0.72rem; line-height:2; border-radius:4px; display:none; }
.row { display:flex; gap:16px; }
.lbl { color:#4a6070; }
#toast { position:fixed; top:60px; left:50%; transform:translateX(-50%); background:#111820; border:1px solid #00d4ff; color:#00d4ff; padding:6px 18px; font-size:0.75rem; border-radius:3px; z-index:9999; display:none; font-family:monospace; }
</style>
</head>
<body>
<header>
  <h1>FLIGHT<span>VIEW</span></h1>
  <div class="controls">
    <button class="btn" id="btn-igc">IGC laden</button>
    <button class="btn" id="btn-cup">CUP laden</button>
    <button class="btn" onclick="fitAll()">Ansicht</button>
    <button class="btn" onclick="resetAll()">Reset</button>
  </div>
</header>
<input type="file" id="f-igc" style="display:none">
<input type="file" id="f-cup" style="display:none">
<div id="map"></div>
<div id="info">
  <div class="row"><span class="lbl">Pilot</span><span id="s-pilot"></span></div>
  <div class="row"><span class="lbl">Datum</span><span id="s-date"></span></div>
  <div class="row"><span class="lbl">Glider</span><span id="s-glider"></span></div>
  <div class="row"><span class="lbl">Punkte</span><span id="s-pts"></span></div>
  <div class="row"><span class="lbl">Max Höhe</span><span id="s-alt"></span></div>
  <div class="row"><span class="lbl">Wegpunkte</span><span id="s-wpts"></span></div>
</div>
<div id="toast"></div>

<script>
// Map init — warte bis DOM fertig
var map, wptGroup, trackLayer;
window.addEventListener('load', function() {
  map = L.map('map').setView([47.5, 11.0], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom:19
  }).addTo(map);
  wptGroup = L.layerGroup().addTo(map);
  map.invalidateSize();
});

// File buttons
document.getElementById('btn-igc').addEventListener('click', function() {
  document.getElementById('f-igc').click();
});
document.getElementById('btn-cup').addEventListener('click', function() {
  document.getElementById('f-cup').click();
});
document.getElementById('f-igc').addEventListener('change', function(e) {
  var f = e.target.files[0]; if (!f) return;
  readText(f, function(txt) { handleIGC(txt, f.name); });
  e.target.value = '';
});
document.getElementById('f-cup').addEventListener('change', function(e) {
  var f = e.target.files[0]; if (!f) return;
  readText(f, function(txt) { handleCUP(txt, f.name); });
  e.target.value = '';
});

function readText(file, cb) {
  var r = new FileReader();
  r.onload = function(e) { cb(e.target.result); };
  r.readAsText(file, 'utf-8');
}

// IGC
function handleIGC(txt, fname) {
  var lines = txt.split(/\r?\n/);
  var pts = [], meta = { pilot:'—', date:'—', glider:'—' };
  for (var i=0; i<lines.length; i++) {
    var l = lines[i];
    if (/^HF.?PLT/i.test(l)) meta.pilot = l.split(':').slice(1).join(':').trim() || '—';
    if (/^HF.?DTE/i.test(l)) {
      var m = l.match(/(\d{2})(\d{2})(\d{2})/);
      if (m) { var y = +m[3]>50 ? 1900+(+m[3]) : 2000+(+m[3]); meta.date = m[1]+'.'+m[2]+'.'+y; }
    }
    if (/^HF.?GTY/i.test(l)) meta.glider = l.split(':').slice(1).join(':').trim() || '—';
    if (l.charAt(0)==='B' && l.length>=35) {
      var lat = dmm(l.substr(7,7), l.charAt(14));
      var lon = dmm(l.substr(15,8), l.charAt(23));
      var alt = parseInt(l.substr(25,5)) || parseInt(l.substr(30,5)) || 0;
      if (lat!==null && lon!==null) pts.push([lat,lon,alt]);
    }
  }
  if (!pts.length) { toast('Keine B-Records gefunden'); return; }
  if (trackLayer) map.removeLayer(trackLayer);
  var lls = pts.map(function(p){return [p[0],p[1]];});
  trackLayer = L.polyline(lls, {color:'#00d4ff', weight:2.5, opacity:0.9}).addTo(map);
  L.marker(lls[0], {icon:dot('#00ff88')}).bindTooltip('Start').addTo(map);
  L.marker(lls[lls.length-1], {icon:dot('#ff3366')}).bindTooltip('Ziel').addTo(map);
  var maxAlt = pts.reduce(function(a,p){return Math.max(a,p[2]);},0);
  setText('s-pilot', meta.pilot);
  setText('s-date', meta.date);
  setText('s-glider', meta.glider);
  setText('s-pts', pts.length.toLocaleString('de'));
  setText('s-alt', maxAlt > 0 ? maxAlt+' m' : '—');
  document.getElementById('info').style.display = 'block';
  document.getElementById('btn-igc').textContent = fname;
  document.getElementById('btn-igc').className = 'btn ok';
  fitAll(); toast(pts.length+' Trackpunkte geladen');
}

function dmm(s, h) {
  var deg, min;
  if (s.length===7) { deg=+s.substr(0,2); min=+s.substr(2,2)+(+s.substr(4,3))/1000; }
  else              { deg=+s.substr(0,3); min=+s.substr(3,2)+(+s.substr(5,3))/1000; }
  var v = deg + min/60;
  if (h==='S'||h==='W') v=-v;
  return isNaN(v)?null:v;
}

// CUP
function handleCUP(txt, fname) {
  var lines = txt.split(/\r?\n/);
  var wpts = [];
  for (var i=0; i<lines.length; i++) {
    var l = lines[i].trim();
    if (!l || l.indexOf('-----')===0) break;
    var cols = csvSplit(l);
    if (cols.length < 5) continue;
    var name = cols[0].replace(/^"|"$/g,'').trim();
    var code = (cols[1]||'').replace(/^"|"$/g,'').trim();
    var latS = (cols[3]||'').replace(/^"|"$/g,'').trim();
    var lonS = (cols[4]||'').replace(/^"|"$/g,'').trim();
    var elev = (cols[5]||'').replace(/^"|"$/g,'').trim();
    if (!name || /^name$|^title$/i.test(name)) continue;
    var lat = cupCoord(latS), lon = cupCoord(lonS);
    if (lat!==null && lon!==null) wpts.push({name:name,code:code,lat:lat,lon:lon,elev:elev});
  }
  if (!wpts.length) { toast('Keine Wegpunkte gefunden'); return; }
  wptGroup.clearLayers();
  wpts.forEach(function(w) {
    var icon = L.divIcon({
      html: '<div style="width:9px;height:9px;border-radius:50%;border:2px solid #ff6b35;box-shadow:0 0 4px rgba(255,107,53,0.5)"></div>',
      className:'', iconAnchor:[4,4]
    });
    L.marker([w.lat,w.lon],{icon:icon})
      .bindTooltip('<b>'+w.name+'</b>'+(w.code?'<br>'+w.code:'')+(w.elev?'<br>'+w.elev:''), {direction:'top'})
      .addTo(wptGroup);
  });
  setText('s-wpts', wpts.length);
  document.getElementById('info').style.display = 'block';
  document.getElementById('btn-cup').textContent = fname;
  document.getElementById('btn-cup').className = 'btn ok';
  fitAll(); toast(wpts.length+' Wegpunkte geladen');
}

function cupCoord(s) {
  if (!s) return null;
  var m = s.match(/^(\d+)(\d{2}\.\d+)([NSEWnsew])$/);
  if (!m) return null;
  var v = +m[1] + (+m[2])/60;
  if (/[SsWw]/.test(m[3])) v=-v;
  return isNaN(v)?null:v;
}

function csvSplit(line) {
  var res=[], cur='', inQ=false;
  for (var i=0; i<line.length; i++) {
    var c=line[i];
    if (c==='"') inQ=!inQ;
    else if (c===','&&!inQ) { res.push(cur); cur=''; }
    else cur+=c;
  }
  res.push(cur); return res;
}

// Helpers
function dot(color) {
  return L.divIcon({
    html:'<div style="width:10px;height:10px;border-radius:50%;background:'+color+';border:2px solid #fff"></div>',
    className:'', iconAnchor:[5,5]
  });
}

function fitAll() {
  var bds=[];
  if (trackLayer) trackLayer.getLatLngs().forEach(function(ll){bds.push([ll.lat,ll.lng]);});
  wptGroup.eachLayer(function(l){ if(l.getLatLng){var ll=l.getLatLng();bds.push([ll.lat,ll.lng]);} });
  if (bds.length) map.fitBounds(L.latLngBounds(bds), {padding:[40,40]});
}

function resetAll() {
  if (trackLayer) { map.removeLayer(trackLayer); trackLayer=null; }
  wptGroup.clearLayers();
  document.getElementById('info').style.display='none';
  document.getElementById('btn-igc').textContent='IGC laden';
  document.getElementById('btn-igc').className='btn';
  document.getElementById('btn-cup').textContent='CUP laden';
  document.getElementById('btn-cup').className='btn';
  ['s-pilot','s-date','s-glider','s-pts','s-alt','s-wpts'].forEach(function(id){setText(id,'');});
}

var toastTimer;
function toast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.style.display='none';},3000);
}

function setText(id, val) {
  document.getElementById(id).textContent = val;
}
</script>
</body>
</html>
